apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hb-demo-ingress
  namespace: hb-demo
spec:
  rules:
    - host: hb-demo.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-web
                port:
                  number: 3000
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080
