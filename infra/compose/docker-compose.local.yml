name: hb-demo-local

services:
  # Catalog API local container.
  # Compose service name also becomes the DNS name on the shared network.
  catalog-service:
    build:
      context: ../../services/catalog-service
    image: hb-demo/catalog-service:local
    restart: unless-stopped
    ports:
      - "8081:8081"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/health')",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - hb-demo-local

  # Cart API local container.
  # Compose service name also becomes the DNS name on the shared network.
  cart-service:
    build:
      context: ../../services/cart-service
    image: hb-demo/cart-service:local
    restart: unless-stopped
    ports:
      - "8082:8082"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8082/health')",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - hb-demo-local

  # Gateway reaches backend services via Docker DNS:
  # http://catalog-service:8081
  # http://cart-service:8082
  api-gateway:
    build:
      context: ../../services/api-gateway
    image: hb-demo/api-gateway:local
    restart: unless-stopped
    depends_on:
      catalog-service:
        condition: service_healthy
      cart-service:
        condition: service_healthy
    environment:
      CATALOG_SERVICE_URL: http://catalog-service:8081
      CART_SERVICE_URL: http://cart-service:8082
      REQUEST_TIMEOUT_SECONDS: "5"
    ports:
      - "8080:8080"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - hb-demo-local

networks:
  # Single bridge network is enough for local development and service discovery.
  hb-demo-local:
    driver: bridge
