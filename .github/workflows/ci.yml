name: Service CI Checks

on:
  # Run CI for direct updates to main and for PRs targeting main.
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate-python-services:
    name: Validate Python Services
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service_name: catalog-service
            service_path: services/catalog-service
            run_pytest: true
          - service_name: api-gateway
            service_path: services/api-gateway
            run_pytest: false
          - service_name: cart-service
            service_path: services/cart-service
            run_pytest: true

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4

      - name: Set Up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ${{ matrix.service_path }}/requirements.txt

      - name: Install Service Dependencies
        working-directory: ${{ matrix.service_path }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Python Syntax Checks
        working-directory: ${{ matrix.service_path }}
        run: |
          python -m compileall -q app wsgi.py

      - name: Run Pytest Suite
        if: ${{ matrix.run_pytest }}
        working-directory: ${{ matrix.service_path }}
        env:
          PYTHONPATH: .
        run: |
          pytest

  build-service-images:
    name: Build Service Images
    runs-on: ubuntu-latest
    needs: validate-python-services
    strategy:
      fail-fast: false
      matrix:
        include:
          - service_name: catalog-service
            service_path: services/catalog-service
            image_name: hb-demo/catalog-service
          - service_name: api-gateway
            service_path: services/api-gateway
            image_name: hb-demo/api-gateway
          - service_name: cart-service
            service_path: services/cart-service
            image_name: hb-demo/cart-service

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        working-directory: ${{ matrix.service_path }}
        run: |
          # Build-only validation keeps CI focused on integration health.
          docker build --tag ${{ matrix.image_name }}:ci .
